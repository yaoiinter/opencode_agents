schema: spec-driven
context: |
    【全局约束与参考文档】
    在生成任何规范、设计或代码之前，你必须强制读取并严格遵守以下文档（位于项目 docs/ 目录下）：

    1. 业务架构 ( ./docs/ba.md )：包含所有业务逻辑、状态机和领域名词字典。任何需求都不得偏离此业务基准。
    2. 技术架构 ( ./docs/ta.md )：定义了技术选型边界。绝不允许使用该文档之外的运行时、框架或组件库。
#  3. 研发规范 ( ./docs/workflow.md )：定义了完成标准(DoD)和代码编写步骤。
rules:
    proposal:
        - 验证该提案是否符合 `./docs/ba.md` 中的宏观业务目标。
    specs:
        - 所有的领域实体和状态流转必须与 `./docs/ba.md` 的定义100%对齐。
    design:
        - 技术实现方案必须严格遵守 `./docs/ta.md` 中的技术栈限制，如有冲突必须报错中止。
    git:
        - 用中文编写git commit 注释。
#  tasks:
#    - 任务拆解和验收标准必须符合 `./docs/workflow.md` 中定义的流程。

